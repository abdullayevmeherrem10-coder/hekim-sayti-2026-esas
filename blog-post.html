<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Məqalə | Şahsəddin İmanlı</title>
    <link rel="icon" type="image/png" href="esas-loqo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .blog-detail {
            max-width: 800px;
            margin: 120px auto 60px;
            padding: 0 20px;
        }
        .blog-detail-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--gold);
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            margin-bottom: 30px;
            transition: var(--transition);
        }
        .blog-detail-back:hover {
            color: var(--gold-dark);
        }
        .blog-detail-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        .blog-detail-date {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
            display: block;
        }
        .blog-detail-image {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-card);
        }
        .blog-detail-body {
            font-family: var(--font-body);
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }
        .blog-detail-body h1,
        .blog-detail-body h2,
        .blog-detail-body h3 {
            font-family: var(--font-display);
            color: var(--text-primary);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
        .blog-detail-body p {
            margin-bottom: 1em;
        }
        .blog-detail-body ul,
        .blog-detail-body ol {
            margin-bottom: 1em;
            padding-left: 1.5em;
        }
        .blog-detail-body blockquote {
            border-left: 4px solid var(--gold);
            padding: 12px 20px;
            margin: 1.5em 0;
            background: var(--bg-secondary);
            border-radius: 0 12px 12px 0;
            font-style: italic;
        }
        .blog-detail-body b, .blog-detail-body strong {
            color: var(--text-primary);
        }
        .blog-detail-loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            font-size: 1rem;
        }
        @media (max-width: 600px) {
            .blog-detail { margin-top: 100px; }
            .blog-detail-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container navbar-content">
            <a href="index.html" class="navbar-logo"></a>
            <ul class="navbar-menu" id="navMenu">
                <li><a href="index.html#about" class="nav-link" data-i18n-nav="about">Haqqında</a></li>
                <li><a href="index.html#services" class="nav-link" data-i18n-nav="services">Xidmətlər</a></li>
                <li><a href="index.html#problems" class="nav-link" data-i18n-nav="problems">Problemlər</a></li>
                <li><a href="index.html#faq" class="nav-link" data-i18n-nav="faq">Sual-Cavab</a></li>
                <li><a href="index.html#contact" class="nav-link" data-i18n-nav="contact">Əlaqə</a></li>
            </ul>
            <!-- Language Switcher -->
            <div class="lang-switcher" id="langSwitcher">
                <div class="lang-option" data-lang="az">
                    <img src="https://flagcdn.com/w40/az.png" alt="AZ">
                    <span>AZ</span>
                </div>
                <div class="lang-option" data-lang="ru">
                    <img src="https://flagcdn.com/w40/ru.png" alt="RU">
                    <span>RUS</span>
                </div>
                <div class="lang-option" data-lang="en">
                    <img src="https://flagcdn.com/w40/gb.png" alt="EN">
                    <span>ENG</span>
                </div>
                <div class="lang-option" data-lang="tr">
                    <img src="https://flagcdn.com/w40/tr.png" alt="TR">
                    <span>TR</span>
                </div>
            </div>
            <a href="https://wa.link/wcams9" target="_blank" class="btn-session">Seansa Yazıl</a>
            <button class="hamburger" id="hamburger" aria-label="Menyu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <div class="blog-detail" id="blogDetail">
        <div class="blog-detail-loading">
            <i class="fas fa-spinner fa-spin"></i> Yüklənir...
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Şahsəddin İmanlı. Bütün hüquqlar qorunur.</p>
            </div>
        </div>
    </footer>

    <script>
        const CONTENTFUL_SPACE = 'q3fe87ca4p3k';
        const CONTENTFUL_TOKEN = 'uyQ8WH4Rhs40Y1OBAoXI9nzQGunrNUAtEU4lizTZL-o';
        const LANG_TO_LOCALE = { az: 'az', ru: 'ru', en: 'az', tr: 'az' };
        const UI_TEXTS = {
            az: { back: 'Geri qayıt', loading: 'Yüklənir...', notFound: 'Məqalə tapılmadı.', error: 'Məqalə yüklənə bilmədi.' },
            ru: { back: 'Назад', loading: 'Загрузка...', notFound: 'Статья не найдена.', error: 'Не удалось загрузить статью.' },
            en: { back: 'Go back', loading: 'Loading...', notFound: 'Article not found.', error: 'Failed to load article.' },
            tr: { back: 'Geri dön', loading: 'Yükleniyor...', notFound: 'Makale bulunamadı.', error: 'Makale yüklenemedi.' }
        };
        const NAV_TEXTS = {
            az: { about: 'Haqqında', services: 'Xidmətlər', problems: 'Problemlər', faq: 'Sual-Cavab', contact: 'Əlaqə', session: 'Seansa Yazıl' },
            ru: { about: 'О нас', services: 'Услуги', problems: 'Проблемы', faq: 'Вопросы', contact: 'Контакты', session: 'Записаться' },
            en: { about: 'About', services: 'Services', problems: 'Problems', faq: 'FAQ', contact: 'Contact', session: 'Book Session' },
            tr: { about: 'Hakkında', services: 'Hizmetler', problems: 'Sorunlar', faq: 'SSS', contact: 'İletişim', session: 'Seans Al' }
        };
        let currentLang = localStorage.getItem('lang') || 'az';
        let locale = LANG_TO_LOCALE[currentLang] || 'az';

        function updatePageLang() {
            document.querySelectorAll('.lang-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.lang === currentLang);
            });
            const nav = NAV_TEXTS[currentLang] || NAV_TEXTS.az;
            document.querySelectorAll('[data-i18n-nav]').forEach(el => {
                const key = el.getAttribute('data-i18n-nav');
                if (nav[key]) el.textContent = nav[key];
            });
            const sessionBtn = document.querySelector('.btn-session');
            if (sessionBtn) sessionBtn.textContent = nav.session;
        }
        updatePageLang();

        // Lang switcher
        document.querySelectorAll('.lang-option').forEach(opt => {
            opt.addEventListener('click', () => {
                currentLang = opt.dataset.lang;
                locale = LANG_TO_LOCALE[currentLang] || 'az';
                localStorage.setItem('lang', currentLang);
                updatePageLang();
                loadPost();
            });
        });

        // Rich text renderer
        function renderRichText(node) {
            if (!node) return '';
            if (typeof node === 'string') return node;
            if (node.nodeType === 'text') {
                let text = node.value || '';
                if (node.marks) {
                    node.marks.forEach(mark => {
                        if (mark.type === 'bold') text = `<strong>${text}</strong>`;
                        if (mark.type === 'italic') text = `<em>${text}</em>`;
                        if (mark.type === 'underline') text = `<u>${text}</u>`;
                    });
                }
                return text;
            }
            const children = (node.content || []).map(renderRichText).join('');
            switch (node.nodeType) {
                case 'document': return children;
                case 'paragraph': return `<p>${children}</p>`;
                case 'heading-1': return `<h1>${children}</h1>`;
                case 'heading-2': return `<h2>${children}</h2>`;
                case 'heading-3': return `<h3>${children}</h3>`;
                case 'heading-4': return `<h4>${children}</h4>`;
                case 'blockquote': return `<blockquote>${children}</blockquote>`;
                case 'unordered-list': return `<ul>${children}</ul>`;
                case 'ordered-list': return `<ol>${children}</ol>`;
                case 'list-item': return `<li>${children}</li>`;
                case 'hr': return '<hr>';
                case 'hyperlink':
                    const uri = node.data && node.data.uri ? node.data.uri : '#';
                    return `<a href="${uri}" target="_blank" rel="noopener">${children}</a>`;
                default: return children;
            }
        }

        async function loadPost() {
            const container = document.getElementById('blogDetail');
            const ui = UI_TEXTS[currentLang] || UI_TEXTS.az;
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('id');
            if (!postId) {
                container.innerHTML = `<p style="text-align:center;color:#999;padding:80px 0;">${ui.notFound}</p>`;
                return;
            }
            container.innerHTML = `<div class="blog-detail-loading"><i class="fas fa-spinner fa-spin"></i> ${ui.loading}</div>`;
            try {
                const res = await fetch(
                    `https://cdn.contentful.com/spaces/${CONTENTFUL_SPACE}/entries/${postId}?access_token=${CONTENTFUL_TOKEN}&locale=${locale}`
                );
                const item = await res.json();
                if (!item.fields) {
                    container.innerHTML = '<p style="text-align:center;color:#999;padding:80px 0;">Məqalə tapılmadı.</p>';
                    return;
                }
                const f = item.fields;
                document.title = f.title + ' | Şahsəddin İmanlı';

                let imgHtml = '';
                if (f.image && f.image.sys) {
                    const assetRes = await fetch(
                        `https://cdn.contentful.com/spaces/${CONTENTFUL_SPACE}/assets/${f.image.sys.id}?access_token=${CONTENTFUL_TOKEN}&locale=${locale}`
                    );
                    const asset = await assetRes.json();
                    if (asset.fields && asset.fields.file) {
                        imgHtml = `<img class="blog-detail-image" src="https:${asset.fields.file.url}" alt="${f.title}">`;
                    }
                }

                const bodyHtml = f.content ? renderRichText(f.content) : '';

                container.innerHTML = `
                    <a href="index.html#about" class="blog-detail-back"><i class="fas fa-arrow-left"></i> ${ui.back}</a>
                    <h1 class="blog-detail-title">${f.title}</h1>
                    <span class="blog-detail-date">${f.date || ''}</span>
                    ${imgHtml}
                    <div class="blog-detail-body">${bodyHtml}</div>
                `;
            } catch (err) {
                container.innerHTML = `<p style="text-align:center;color:#999;padding:80px 0;">${ui.error}</p>`;
            }
        }

        loadPost();

        // Hamburger menu
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');
        if (hamburger && navMenu) {
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                navMenu.classList.toggle('active');
            });
        }
    </script>
</body>
</html>
